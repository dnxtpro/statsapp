<div #courtContainer style="position:relative;">
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
        <button mat-raised-button color="primary" (click)="toggleHeatmap()">{{ showHeatmap ? 'Ocultar Heatmap' : 'Mostrar Heatmap' }}</button>
        <button mat-stroked-button color="warn" (click)="clearStoredEvents()">Borrar Eventos</button>
        <span style="color:var(--text-color,#222); font-size:0.9rem;">Eventos: {{ getStoredEvents().length }}</span>
    </div>

    <div #heatmapContainer class="heatmap-layer" [style.display]="showHeatmap ? 'block' : 'none'" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;"></div>

    <svg
    width="119.0625mm"
    height="119.0625mm"
    viewBox="0 0 119.0625 119.0625"
    version="1.1"
    id="svg1"
    #courtSvg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:svg="http://www.w3.org/2000/svg"
    preserveAspectRatio="xMidYMid meet"
    (click)="onSvgClick($event)">
    
    <defs
    id="defs1" />
    <g
    id="layer1"
    transform="translate(-24.110701,-5.2460783)">
    <rect
    style="fill:#a0f3ff;fill-opacity:1;stroke:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1, 2"
    id="rect1"
    width="119.0625"
    height="79.375"
    x="24.110701"
    y="44.933578" />
    <rect
    style="fill:#7d7d7d;fill-opacity:1;stroke:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1, 2"
       id="rect2"
       width="119.0625"
       height="39.6875"
       x="24.110703"
       y="5.2460785" />
    </g>
    </svg>
</div>
