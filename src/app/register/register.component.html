
      <form class="form" (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
        <div class="input-group">
          <label>Nombre de usuario</label>
          <input matInput type="text" name="username" [(ngModel)]="form.username" required #username="ngModel">
          <mat-error *ngIf="username.invalid && (username.dirty || username.touched)">
            El nombre de usuario es requerido
          </mat-error>
        </div>

        <div class="input-group">
          <label>Correo electrónico</label>
          <input matInput type="email" name="email" [(ngModel)]="form.email" required email #email="ngModel">
          <mat-error *ngIf="email.invalid && (email.dirty || email.touched)">
            Ingrese un correo electrónico válido
          </mat-error>
        </div>
        

        <div class="input-group">
          <label>Contraseña</label>
          <input matInput type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel">
          <mat-error *ngIf="password.invalid && (password.dirty || password.touched)">
            <span *ngIf="password.errors?.['required']">La contraseña es requerida</span>
            <span *ngIf="password.errors?.['minlength']">La contraseña debe tener al menos 6 caracteres</span>
          </mat-error>
        </div>

        <button class="sign" type="submit" [disabled]="!f.form.valid">
          REGISTRARSE
        </button>
      </form>
