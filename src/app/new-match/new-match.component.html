<div class="container-fluid d-flex justify-content-center vh-100">


 <mat-card class=" col-md-6 align-self-center bg-body justify-content-center d-flex">
   
  <mat-card-header><mat-card-title>Nuevo Partido</mat-card-title></mat-card-header>
  <mat-card-content>
<form class="d-flex flex-column" [formGroup]="matchForm" (ngSubmit)="onSubmit()">
  <mat-form-field class="ml-2">
    <mat-label  for="rivalTeam">Equipo Rival:</mat-label>
    <input matInput type="text" id="rivalTeam" formControlName="rivalTeam">
  </mat-form-field>
  <mat-form-field class="ml-2">

    <mat-label  for="date">Fecha:</mat-label>
    <input matInput type="date" id="date" formControlName="date">  
  </mat-form-field>
  <mat-form-field class="ml-2">

    <mat-label for="location">Ubicación:</mat-label>
    <input matInput type="text" id="location" formControlName="location">
</mat-form-field>
  <mat-form-field>
    <mat-label>Elige tu Plantilla</mat-label>
    <mat-select formControlName="equipoId">
      @for (team of teams; track team) {
        <mat-option [value]="team.id">{{team.nombre}}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  
  <div class="mt-3">
    <label style="font-weight:600; display:block; margin-bottom:6px;">Opciones avanzadas</label>
    <mat-checkbox formControlName="advanced" style="margin-bottom:8px;" color="primary">Habilitar opciones avanzadas</mat-checkbox>

    <div style="display:flex; flex-wrap:wrap; gap:8px; opacity: 1; transition:opacity 180ms;">
      <div formGroupName="modules" style="display:flex; gap:8px; flex-wrap:wrap;">
        <mat-checkbox formControlName="recepcion" color="primary">Recepción</mat-checkbox>
        <mat-checkbox formControlName="saque" color="primary">Saque</mat-checkbox>
        <mat-checkbox formControlName="ataque" color="primary">Ataque</mat-checkbox>
        <mat-checkbox formControlName="colocacion" color="primary">Colocación</mat-checkbox>
        <mat-checkbox formControlName="defensa" color="primary">Defensa</mat-checkbox>
        <mat-checkbox formControlName="bloqueo" color="primary">Bloqueo</mat-checkbox>
      </div>
    </div>
  </div>

    <div style="margin-top:18px;">
      <button mat-fab extended type="submit"  [disabled]="!matchForm.valid"><mat-icon>start</mat-icon>Empezar Partido</button>
    </div>




</form>

 </mat-card-content>
</mat-card>
</div>
